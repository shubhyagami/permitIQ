<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Document — Smart Permit Monitoring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">📄 PermitIQ</a>
        <div class="navbar-nav ms-auto gap-1 d-flex flex-row">
            <a class="btn btn-outline-light btn-sm" th:href="@{/dashboard}">🏠 Dashboard</a>
            <a class="btn btn-outline-light btn-sm" th:href="@{/profile}">👤 Profile</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button class="btn btn-outline-light btn-sm" type="submit">🚪 Logout</button>
            </form>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <h1 class="h3 mb-1">✏ Edit Document</h1>
            <p class="text-muted small mb-4" th:text="${document.originalFileName()}">file.pdf</p>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form th:action="@{/documents/{id}/edit(id=${documentId})}"
                          th:object="${documentUpdateRequest}" method="post">

                        <div class="mb-3">
                            <label class="form-label fw-semibold" for="documentName">Document Name</label>
                            <input class="form-control" id="documentName" th:field="*{documentName}" required>
                            <div class="text-danger small" th:errors="*{documentName}"></div>
                        </div>

                        <div class="row">
                            <div class="col-sm-6 mb-3">
                                <label class="form-label fw-semibold" for="documentType">Document Type</label>
                                <input class="form-control" id="documentType" th:field="*{documentType}"
                                       placeholder="e.g., Vehicle, Safety, Insurance">
                            </div>
                            <div class="col-sm-6 mb-3">
                                <label class="form-label fw-semibold" for="permitNumber">Permit Number</label>
                                <input class="form-control" id="permitNumber" th:field="*{permitNumber}"
                                       placeholder="e.g., MH03-ABC-1234">
                            </div>
                            <div class="col-sm-6 mb-3">
                                <label class="form-label fw-semibold" for="issueDate">Issue Date</label>
                                <input class="form-control" id="issueDate" th:field="*{issueDate}" type="date">
                            </div>
                            <div class="col-sm-6 mb-3">
                                <label class="form-label fw-semibold" for="expiryDate">Expiry Date</label>
                                <input class="form-control" id="expiryDate" th:field="*{expiryDate}" type="date">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold" for="authorityName">Authority Name</label>
                            <input class="form-control" id="authorityName" th:field="*{authorityName}"
                                   placeholder="e.g., RTO Mumbai">
                        </div>

                        <div class="d-flex gap-2">
                            <button class="btn btn-primary" type="submit">💾 Save Changes</button>
                            <a class="btn btn-outline-secondary" th:href="@{/dashboard}">Cancel</a>
                        </div>
                    </form>

                    <hr class="my-4">

                    <form th:action="@{/documents/{id}/delete(id=${documentId})}" method="post"
                          onsubmit="return confirm('Permanently delete this document and file?');">
                        <button class="btn btn-outline-danger" type="submit">🗑 Delete Document</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
