<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign Up — Smart Permit Monitoring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="text-center mb-4">
                <h1 class="h2 fw-bold">📄 PermitIQ</h1>
                <p class="text-muted">Create your account</p>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

                    <form th:action="@{/signup}" th:object="${signupRequest}" method="post">
                        <div class="row">
                            <div class="col-sm-6 mb-3">
                                <label class="form-label fw-semibold" for="name">Full Name</label>
                                <input class="form-control" id="name" th:field="*{name}"
                                       placeholder="John Doe" required>
                                <div class="text-danger small" th:errors="*{name}"></div>
                            </div>
                            <div class="col-sm-6 mb-3">
                                <label class="form-label fw-semibold" for="email">Email</label>
                                <input class="form-control" id="email" th:field="*{email}"
                                       type="email" placeholder="you@example.com" required>
                                <div class="text-danger small" th:errors="*{email}"></div>
                            </div>
                            <div class="col-sm-6 mb-3">
                                <label class="form-label fw-semibold" for="password">Password</label>
                                <input class="form-control" id="password" th:field="*{password}"
                                       type="password" placeholder="Min 8 characters" required>
                                <div class="text-danger small" th:errors="*{password}"></div>
                            </div>
                            <div class="col-sm-6 mb-3">
                                <label class="form-label fw-semibold" for="phoneNumber">Phone</label>
                                <input class="form-control" id="phoneNumber" th:field="*{phoneNumber}"
                                       placeholder="+91 9876543210">
                            </div>
                            <div class="col-sm-8 mb-3">
                                <label class="form-label fw-semibold" for="company">Company</label>
                                <input class="form-control" id="company" th:field="*{company}"
                                       placeholder="ABC Corp">
                            </div>
                            <div class="col-sm-4 mb-3">
                                <label class="form-label fw-semibold" for="age">Age</label>
                                <input class="form-control" id="age" th:field="*{age}"
                                       type="number" min="13" max="120" required>
                                <div class="text-danger small" th:errors="*{age}"></div>
                            </div>
                            <div class="col-sm-6 mb-3">
                                <label class="form-label fw-semibold" for="gender">Gender</label>
                                <select class="form-select" id="gender" th:field="*{gender}" required>
                                    <option value="">Select</option>
                                    <option th:each="g : ${genders}" th:value="${g}" th:text="${g}"></option>
                                </select>
                                <div class="text-danger small" th:errors="*{gender}"></div>
                            </div>
                        </div>
                        <button class="btn btn-primary w-100 mb-3" type="submit">Create Account</button>
                    </form>

                    <p class="text-center text-muted mb-0">
                        Already have an account? <a th:href="@{/login}" class="fw-semibold">Sign In</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
