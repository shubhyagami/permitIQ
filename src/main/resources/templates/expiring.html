<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Expiring Documents — Smart Permit Monitoring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .table td, .table th { vertical-align: middle; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">📄 PermitIQ</a>
        <div class="navbar-nav ms-auto gap-1 d-flex flex-row">
            <a class="btn btn-outline-light btn-sm" th:href="@{/dashboard}">🏠 Dashboard</a>
            <a class="btn btn-outline-light btn-sm" th:href="@{/profile}">👤 Profile</a>
            <a class="btn btn-success btn-sm" th:href="@{/upload}">⬆ Upload</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button class="btn btn-outline-light btn-sm" type="submit">🚪 Logout</button>
            </form>
        </div>
    </div>
</nav>

<main class="container py-4">
    <h1 class="h3 mb-2">⏳ Expiring Soon</h1>
    <p class="text-muted mb-4">Documents expiring within 30 days.</p>

    <div th:if="${#lists.isEmpty(documents)}">
        <div class="text-center py-5">
            <div class="display-1 mb-3">✅</div>
            <h2 class="h5 text-muted">All clear!</h2>
            <p class="text-muted">No documents are expiring in the next 30 days.</p>
            <a th:href="@{/dashboard}" class="btn btn-outline-secondary">Back to Dashboard</a>
        </div>
    </div>

    <div class="card border-0 shadow-sm" th:if="${!#lists.isEmpty(documents)}">
        <div class="table-responsive">
            <table class="table mb-0">
                <thead class="table-light">
                <tr>
                    <th>Document</th>
                    <th>Permit No.</th>
                    <th>Authority</th>
                    <th>Expiry</th>
                    <th>Status</th>
                    <th>Countdown</th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="document : ${documents}">
                    <td>
                        <span class="fw-medium" th:text="${document.documentName()}"></span>
                        <br><small class="text-muted" th:text="${document.documentType()} ?: ''"></small>
                    </td>
                    <td th:text="${document.permitNumber()} ?: '-'"></td>
                    <td th:text="${document.authorityName()} ?: '-'"></td>
                    <td>
                        <span class="fw-medium"
                              th:classappend="${document.status().name() == 'EXPIRED'} ? ' text-danger' : ''"
                              th:text="${document.expiryDate()} ?: '-'"></span>
                    </td>
                    <td>
                        <span class="badge rounded-pill"
                              th:classappend="${document.status().name() == 'EXPIRED'}
                                ? ' bg-danger'
                                : (${document.status().name() == 'EXPIRING_SOON'}
                                ? ' bg-warning text-dark'
                                : ' bg-success')"
                              th:text="${document.status()}"></span>
                    </td>
                    <td>
                        <span class="fw-medium small countdown" th:attr="data-expiry=${document.expiryDate()}">-</span>
                    </td>
                    <td class="text-end">
                        <div class="d-flex gap-1 justify-content-end">
                            <a class="btn btn-outline-secondary btn-sm"
                               th:href="@{/documents/{id}/edit(id=${document.id()})}">✏</a>
                            <form th:action="@{/documents/{id}/delete(id=${document.id()})}" method="post"
                                  onsubmit="return confirm('Remove this document?');">
                                <button class="btn btn-outline-danger btn-sm" type="submit">🗑</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script>
    function renderCountdown(el) {
        const expiry = el.dataset.expiry;
        if (!expiry) { el.textContent = 'N/A'; return; }
        const target = new Date(expiry + 'T00:00:00');
        target.setDate(target.getDate() + 1);
        const diff = target.getTime() - Date.now();
        if (diff <= 0) { el.textContent = 'EXPIRED'; return; }
        const total = Math.floor(diff / 1000);
        const d = Math.floor(total / 86400);
        const h = Math.floor((total % 86400) / 3600);
        const m = Math.floor((total % 3600) / 60);
        const s = total % 60;
        el.textContent = `${d}d ${h}h ${m}m ${s}s`;
    }
    function tick() { document.querySelectorAll('.countdown').forEach(renderCountdown); }
    tick(); setInterval(tick, 1000);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
