services:
  app:
    build: .
    container_name: smart-permit-monitoring-system
    depends_on:
      - db
    environment:
      DB_URL: jdbc:mysql://db:3306/permitdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: permit_user
      DB_PASSWORD: permit_password
      JWT_SECRET: replace-this-docker-secret-with-at-least-32-characters
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      UPLOAD_DIR: /app/uploads
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads

  db:
    image: mysql:8.0
    container_name: permitdb
    environment:
      MYSQL_DATABASE: permitdb
      MYSQL_USER: permit_user
      MYSQL_PASSWORD: permit_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  uploads:
  mysql-data:
