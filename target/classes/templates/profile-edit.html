<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Profile — Smart Permit Monitoring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">📄 PermitIQ</a>
        <div class="navbar-nav ms-auto gap-1 d-flex flex-row">
            <a class="btn btn-outline-light btn-sm" th:href="@{/profile}">👤 Profile</a>
            <a class="btn btn-outline-light btn-sm" th:href="@{/dashboard}">🏠 Dashboard</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button class="btn btn-outline-light btn-sm" type="submit">🚪 Logout</button>
            </form>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <h1 class="h3 mb-4">✏ Edit Profile</h1>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form th:action="@{/profile/edit}" method="post">
                        <div class="row">
                            <div class="col-sm-6 mb-3">
                                <label class="form-label fw-semibold" for="name">Name</label>
                                <input class="form-control" id="name" name="name"
                                       th:value="${user.name}" required>
                            </div>
                            <div class="col-sm-6 mb-3">
                                <label class="form-label fw-semibold" for="phoneNumber">Phone</label>
                                <input class="form-control" id="phoneNumber" name="phoneNumber"
                                       th:value="${user.phoneNumber}">
                            </div>
                            <div class="col-sm-6 mb-3">
                                <label class="form-label fw-semibold" for="company">Company</label>
                                <input class="form-control" id="company" name="company"
                                       th:value="${user.company}">
                            </div>
                            <div class="col-sm-6 mb-3">
                                <label class="form-label fw-semibold" for="age">Age</label>
                                <input class="form-control" id="age" name="age" type="number"
                                       min="13" max="120" th:value="${user.age}" required>
                            </div>
                        </div>
                        <p class="small text-muted mb-3">Email and role cannot be changed.</p>
                        <div class="d-flex gap-2">
                            <button class="btn btn-primary" type="submit">💾 Save Changes</button>
                            <a class="btn btn-outline-secondary" th:href="@{/profile}">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
