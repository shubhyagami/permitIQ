<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — Smart Permit Monitoring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">
<main class="container">
    <div class="row justify-content-center">
        <div class="col-sm-8 col-md-6 col-lg-4">
            <div class="text-center mb-4">
                <h1 class="h2 fw-bold">📄 PermitIQ</h1>
                <p class="text-muted">Smart Permit Monitoring System</p>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h2 class="h5 mb-3">Sign In</h2>

                    <div th:if="${param.error}" class="alert alert-danger py-2">Invalid email or password.</div>
                    <div th:if="${param.logout}" class="alert alert-info py-2">You have been logged out.</div>
                    <div th:if="${success}" class="alert alert-success py-2" th:text="${success}"></div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold" for="email">Email</label>
                            <input class="form-control" id="email" name="email"
                                   type="email" placeholder="you@example.com" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold" for="password">Password</label>
                            <input class="form-control" id="password" name="password"
                                   type="password" placeholder="••••••••" required>
                        </div>
                        <button class="btn btn-primary w-100 mb-3" type="submit">Sign In</button>
                    </form>

                    <p class="text-center text-muted mb-0">
                        No account? <a th:href="@{/signup}" class="fw-semibold">Create one</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
