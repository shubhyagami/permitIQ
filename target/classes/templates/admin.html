<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Panel — Smart Permit Monitoring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .table td, .table th { vertical-align: middle; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">📄 PermitIQ</a>
        <div class="navbar-nav ms-auto gap-1 d-flex flex-row">
            <a class="btn btn-outline-light btn-sm" th:href="@{/dashboard}">🏠 Dashboard</a>
            <a class="btn btn-outline-light btn-sm" th:href="@{/profile}">👤 Profile</a>
            <a class="btn btn-success btn-sm" th:href="@{/upload}">⬆ Upload</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button class="btn btn-outline-light btn-sm" type="submit">🚪 Logout</button>
            </form>
        </div>
    </div>
</nav>

<main class="container py-4">

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-3">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <h1 class="h3 mb-4">🔧 Admin Panel</h1>

    <!-- Stats -->
    <div class="row g-3 mb-4">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body text-center py-4">
                    <p class="text-muted small fw-semibold mb-1">Total Users</p>
                    <h2 class="display-5 fw-bold mb-0" th:text="${usersCount}">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body text-center py-4">
                    <p class="text-muted small fw-semibold mb-1">Total Documents</p>
                    <h2 class="display-5 fw-bold mb-0" th:text="${documentsCount}">0</h2>
                </div>
            </div>
        </div>
    </div>

    <!-- Users Table -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="h5 mb-0">All Users</h2>
        <span class="badge bg-secondary" th:text="${#lists.size(users)} + ' user(s)'"></span>
    </div>

    <div th:if="${#lists.isEmpty(users)}" class="alert alert-info">No users registered.</div>

    <div class="card border-0 shadow-sm" th:if="${!#lists.isEmpty(users)}">
        <div class="table-responsive">
            <table class="table mb-0">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Company</th>
                    <th>Role</th>
                    <th>Joined</th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td class="text-muted small" th:text="${user.id}"></td>
                    <td>
                        <span class="fw-medium" th:text="${user.name}"></span>
                    </td>
                    <td th:text="${user.email}"></td>
                    <td th:text="${user.company} ?: '-'"></td>
                    <td>
                        <span class="badge rounded-pill"
                              th:classappend="${user.role.name() == 'ROLE_ADMIN'}
                                ? ' bg-danger' : ' bg-secondary'"
                              th:text="${user.role.name()}"></span>
                    </td>
                    <td class="small text-muted" th:text="${user.createdAt}"></td>
                    <td class="text-end">
                        <div class="d-flex gap-1 justify-content-end">
                            <a class="btn btn-outline-primary btn-sm"
                               th:href="@{/admin/users/{id}(id=${user.id})}">👁 View</a>
                            <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post"
                                  onsubmit="return confirm('Delete user ' + this.getAttribute('data-email') + ' and all their documents?');"
                                  th:attr="data-email=${user.email}">
                                <button class="btn btn-outline-danger btn-sm" type="submit">🗑</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
