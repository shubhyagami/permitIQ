<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profile — Smart Permit Monitoring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">📄 PermitIQ</a>
        <div class="navbar-nav ms-auto gap-1 d-flex flex-row">
            <a class="btn btn-outline-light btn-sm" th:href="@{/dashboard}">🏠 Dashboard</a>
            <a class="btn btn-outline-warning btn-sm" th:href="@{/expiring}">⏳ Expiring</a>
            <a class="btn btn-success btn-sm" th:href="@{/upload}">⬆ Upload</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button class="btn btn-outline-light btn-sm" type="submit">🚪 Logout</button>
            </form>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-7">

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h1 class="h3 mb-0">👤 Profile</h1>
                <a class="btn btn-outline-primary btn-sm" th:href="@{/profile/edit}">✏ Edit Profile</a>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <div class="row">
                        <div class="col-12 mb-4 text-center">
                            <div class="bg-secondary bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center"
                                 style="width: 80px; height: 80px; font-size: 2rem;">👤</div>
                            <h2 class="h5 mt-2 mb-0" th:text="${user.name}"></h2>
                            <small class="text-muted" th:text="${user.role}"></small>
                        </div>
                        <div class="col-sm-6 mb-2">
                            <small class="text-muted d-block">Email</small>
                            <span class="fw-medium" th:text="${user.email}"></span>
                        </div>
                        <div class="col-sm-6 mb-2">
                            <small class="text-muted d-block">Phone</small>
                            <span class="fw-medium" th:text="${user.phoneNumber} ?: '-'"></span>
                        </div>
                        <div class="col-sm-6 mb-2">
                            <small class="text-muted d-block">Company</small>
                            <span class="fw-medium" th:text="${user.company} ?: '-'"></span>
                        </div>
                        <div class="col-sm-6 mb-2">
                            <small class="text-muted d-block">Age</small>
                            <span class="fw-medium" th:text="${user.age} ?: '-'"></span>
                        </div>
                        <div class="col-sm-6 mb-2">
                            <small class="text-muted d-block">Gender</small>
                            <span class="fw-medium" th:text="${user.gender} ?: '-'"></span>
                        </div>
                        <div class="col-sm-6 mb-2">
                            <small class="text-muted d-block">Joined</small>
                            <span class="fw-medium" th:text="${user.createdAt}"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
