<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User Details - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container">
        <a class="navbar-brand" th:href="@{/dashboard}">Smart Permit Monitoring</a>
        <div class="ms-auto d-flex gap-2">
            <a class="btn btn-outline-primary btn-sm" th:href="@{/admin}">Admin Panel</a>
            <a class="btn btn-outline-secondary btn-sm" th:href="@{/dashboard}">Dashboard</a>
            <form th:action="@{/logout}" method="post">
                <button class="btn btn-outline-secondary btn-sm" type="submit">Logout</button>
            </form>
        </div>
    </div>
</nav>
<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h1 class="h4 mb-1" th:text="${targetUser.name}">User Name</h1>
            <p class="text-muted mb-0" th:text="${targetUser.email}">email@example.com</p>
        </div>
        <a class="btn btn-link" th:href="@{/admin}">Back to Admin</a>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <dl class="row mb-0">
                <dt class="col-sm-4">User ID</dt>
                <dd class="col-sm-8" th:text="${targetUser.id}"></dd>
                <dt class="col-sm-4">Name</dt>
                <dd class="col-sm-8" th:text="${targetUser.name}"></dd>
                <dt class="col-sm-4">Email</dt>
                <dd class="col-sm-8" th:text="${targetUser.email}"></dd>
                <dt class="col-sm-4">Company</dt>
                <dd class="col-sm-8" th:text="${targetUser.company} ?: '-'"></dd>
                <dt class="col-sm-4">Phone</dt>
                <dd class="col-sm-8" th:text="${targetUser.phoneNumber} ?: '-'"></dd>
                <dt class="col-sm-4">Role</dt>
                <dd class="col-sm-8" th:text="${targetUser.role}"></dd>
                <dt class="col-sm-4">Joined</dt>
                <dd class="col-sm-8" th:text="${targetUser.createdAt}"></dd>
            </dl>
        </div>
    </div>

    <h2 class="h5 mb-3">User Documents</h2>
    <div th:if="${#lists.isEmpty(documents)}" class="alert alert-info">No documents uploaded.</div>

    <div class="table-responsive" th:if="${!#lists.isEmpty(documents)}">
        <table class="table table-sm align-middle">
            <thead>
            <tr>
                <th>Name</th>
                <th>Permit No.</th>
                <th>Authority</th>
                <th>Issue Date</th>
                <th>Expiry Date</th>
                <th>Status</th>
                <th>Countdown</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="document : ${documents}">
                <td th:text="${document.documentName()}"></td>
                <td th:text="${document.permitNumber()} ?: '-'"></td>
                <td th:text="${document.authorityName()} ?: '-'"></td>
                <td th:text="${document.issueDate()} ?: '-'"></td>
                <td th:text="${document.expiryDate()} ?: '-'"></td>
                <td th:text="${document.status()}"></td>
                <td class="countdown" th:attr="data-expiry=${document.expiryDate()}">-</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<script>
    function renderCountdown(element) {
        const expiry = element.dataset.expiry;
        if (!expiry) {
            element.textContent = 'Not available';
            return;
        }
        const target = new Date(expiry + 'T00:00:00');
        target.setDate(target.getDate() + 1);
        const diff = target.getTime() - Date.now();
        if (diff <= 0) {
            element.textContent = 'Expired';
            return;
        }
        const totalSeconds = Math.floor(diff / 1000);
        const days = Math.floor(totalSeconds / 86400);
        const hours = Math.floor((totalSeconds % 86400) / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        element.textContent = `${days}d ${hours}h ${minutes}m ${seconds}s`;
    }
    document.querySelectorAll('.countdown').forEach(renderCountdown);
    setInterval(() => document.querySelectorAll('.countdown').forEach(renderCountdown), 1000);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
